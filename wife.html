<!DOCTYPE html>
<html>
<head>
<title>For Tracy Smithy❤️</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#ffd6e7;
margin-top:80px;
overflow:hidden;
}

h1{
font-size:40px;
}

button{
padding:12px 25px;
font-size:20px;
margin:10px;
cursor:pointer;
border:none;
border-radius:12px;
}

#yes{
background:green;
color:white;
}

#no{
background:red;
color:white;
position:relative;
}

.fluffy{
font-size:80px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

.heart{
position:fixed;
top:-10px;
font-size:22px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="fluffy">🐱</div>

<h1>Tracy, will you be my wife? ❤️</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No</button>

<script>

let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");

noBtn.addEventListener("mouseover", function(){

let x = Math.random() * window.innerWidth;
let y = Math.random() * window.innerHeight;

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

yesBtn.onclick = function(){

document.body.innerHTML =
"<h1>❤️ Tracy odundo Krr said YES ❤️</h1><h2>You made me the happiest man alive 🥰</h2><div style='font-size:90px'>🐱💖</div>";

};

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
